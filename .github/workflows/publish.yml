name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crates-io:
    name: Publish crate and create release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Read and verify package version
        id: package
        shell: bash
        run: |
          name="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          test "${GITHUB_REF_NAME}" = "v${version}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check whether the version is already published
        id: registry
        shell: bash
        env:
          CRATE_NAME: ${{ steps.package.outputs.name }}
          CRATE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          url="https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}"
          if curl --fail --silent --show-error --user-agent clipfile-release-workflow "${url}" > /dev/null; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify package
        if: steps.registry.outputs.published != 'true'
        run: cargo publish --dry-run --locked

      - name: Authenticate to crates.io
        if: steps.registry.outputs.published != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.registry.outputs.published != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
